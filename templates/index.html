<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>
</head>
<body>

<h1>Products 🛒</h1>

<ul id="list"></ul>

<script>
fetch("/products")
.then(response => response.json())
.then(data => {
    let list = document.getElementById("list");
    data.forEach(item => {
        let li = document.createElement("li");
        li.textContent = item;
        list.appendChild(li);
    });
});
</script>

</body>
</html>
