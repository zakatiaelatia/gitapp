<!DOCTYPE html>
<html>
<head>
    <title>My Shop</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        li {
            margin: 10px 0;
        }

        a {
            text-decoration: none;
            color: blue;
            font-weight: bold;
        }

        a:hover {
            color: red;
        }
    </style>
</head>
<body>

<h1>Products 🛒</h1>

<ul id="list"></ul>

<script>
fetch("/products")
.then(response => response.json())
.then(data => {
    let list = document.getElementById("list");

    data.forEach(item => {
        let li = document.createElement("li");

        let a = document.createElement("a");
        a.textContent = item.name;
        a.href = item.url;
        a.target = "_blank";

        li.appendChild(a);
        list.appendChild(li);
    });
});
</script>

</body>
</html>
